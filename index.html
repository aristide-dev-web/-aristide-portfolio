<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristide – Tech Founder dai 7 Colori</title>
    <style>
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Ecco i tuoi 7 colori! */
            background: linear-gradient(-45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 70px;
            margin-bottom: 10px;
            letter-spacing: -2px;
            font-weight: 900;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            margin: 20px auto;
            max-width: 700px;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .btn {
            display: inline-block;
            background: white;
            color: #333;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.1) rotate(2deg);
            background: #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Aristide</h1>
        <p style="font-size: 24px;">Tech Founder & Creative Visionary</p>
    </header>

    <div style="flex-grow: 1; padding: 0 20px;">
        <div class="card">
            <h2 style="font-size: 36px;">Il Mondo ai miei Colori 🌈</h2>
            <p>Sviluppatore, sognatore e innovatore. Trasformo idee complesse in realtà digitali vibranti.</p>
            <br>
            <a href="https://github.com/aristide-dev-web" class="btn">Esplora il mio Universo</a>
        </div>
    </div>

    <footer>
        &copy; 2024 Aristide – Il Fondatore dai 7 Colori.
    </footer>

</body>
</html>
